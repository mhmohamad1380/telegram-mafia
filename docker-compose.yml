services:
  postgres:
    image: postgres:16-alpine
    container_name: mafia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mafia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mafia}
      POSTGRES_DB: ${POSTGRES_DB:-mafia}
    # Tuned for a small (~512 MB) host: cap concurrent connections and shrink
    # the shared/work buffers so PostgreSQL keeps a modest RAM footprint.
    command:
      - "postgres"
      - "-c"
      - "max_connections=20"
      - "-c"
      - "shared_buffers=64MB"
      - "-c"
      - "effective_cache_size=128MB"
      - "-c"
      - "work_mem=2MB"
      - "-c"
      - "maintenance_work_mem=16MB"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mafia} -d ${POSTGRES_DB:-mafia}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 200M

  redis:
    image: redis:7-alpine
    container_name: mafia_redis
    restart: unless-stopped
    # Cap Redis memory and evict volatile keys under pressure; FSM state is
    # short-lived so this is safe on a memory-constrained host.
    command: ["redis-server", "--maxmemory", "48mb", "--maxmemory-policy", "volatile-lru", "--save", "\"\""]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 64M

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mafia_bot
    restart: unless-stopped
    # Host networking (Linux) so the container shares the host's network stack.
    # This lets the bot reach a local proxy (e.g. v2rayn at 127.0.0.1:10808) and
    # reach Postgres/Redis via their published ports on localhost. No proxy
    # LAN-binding or host-gateway juggling required.
    network_mode: host
    env_file:
      - .env
    environment:
      # With host networking, the DB and Redis are reachable on localhost via
      # their published ports (see the services above).
      POSTGRES_HOST: 127.0.0.1
      REDIS_HOST: 127.0.0.1
      # Proxy is OPT-IN: defaults to empty (no proxy) so the bot connects
      # directly to Telegram. To route through a local proxy, set BOT_PROXY in
      # your .env, e.g. BOT_PROXY=socks5://127.0.0.1:10808
      BOT_PROXY: ${BOT_PROXY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Mini App server: same image/code/DB/Redis as the bot, but runs the uvicorn
  # process (app.miniapp.server) that serves BOTH the SPA frontend (mounted at /)
  # and the REST + WebSocket API it talks to. Publishes an HTTP port; front it
  # with a TLS-terminating reverse proxy (see README) — Telegram Mini Apps
  # require HTTPS, and MINIAPP_URL must point at that public https:// origin.
  miniapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mafia_miniapp
    restart: unless-stopped
    command: ["python", "-m", "app.miniapp.server"]
    network_mode: host
    env_file:
      - .env
    environment:
      POSTGRES_HOST: 127.0.0.1
      REDIS_HOST: 127.0.0.1
      MINIAPP_HOST: ${MINIAPP_HOST:-0.0.0.0}
      MINIAPP_PORT: ${MINIAPP_PORT:-8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
