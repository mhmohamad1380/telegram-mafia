# Alembic configuration for the Mafia bot project.
# The DB URL is injected programmatically in migrations/env.py from app settings,
# so `sqlalchemy.url` here is intentionally left blank.

[alembic]
# Path to migration scripts (relative to this file / project root).
script_location = app/database/migrations

# Template used to generate migration file names; includes a UTC timestamp
# so migrations sort chronologically.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use OS-independent path separators.
prepend_sys_path = .

# Timezone for the file_template timestamps.
timezone = UTC

sqlalchemy.url =


[post_write_hooks]
# Hooks are disabled by default.


# ------------------------------------------------------------------------------
# Logging configuration
# ------------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
